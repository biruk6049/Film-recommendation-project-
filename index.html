<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hafilm - Movie Recommendations</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner container">
      <a href="#" class="brand">Filmify</a>
      <nav class="main-nav">
        <ul>
          <li><a href="#" class="nav-link active" data-section="home">Home</a></li>
          <li><a href="#" class="nav-link" data-section="popular">Popular</a></li>
          <li><a href="#" class="nav-link" data-section="top-rated">Top Rated</a></li>
          <li><a href="#" class="nav-link" data-section="now-playing">Now Playing</a></li>
        </ul>
      </nav>
      <button id="theme-toggle" class="btn">Toggle Theme</button>
    </div>
  </header>

  <main class="container">
    <!-- Search -->
    <section class="search-section">
      <form id="search-form" class="search-form">
        <div class="search-controls">
          <input id="search-input" type="search" placeholder="Search movies..." autocomplete="off" />
          <button type="submit" class="btn primary">Search</button>
        </div>
      </form>
    </section>

    <!-- Recommendations -->
    <section class="recommendation-section">
      <h2>Recommended for you</h2>
      <div id="recommendation-container" class="recommendation-list">
        <!-- Recommendation cards injected here -->
      </div>
    </section>

    <!-- Search / Popular Results -->
    <section class="results-section">
      <h2>Movies</h2>
      <div id="results-container" class="results-grid">
        <div class="empty-state">No movies yet. Search or select a category above.</div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    &copy; <span id="year"></span> Filmify. All rights reserved.
  </footer>

  <script src="api.js"></script>
  <script src="recommendation.js"></script>
  <script src="script.js"></script>
</body>
</html>
